<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORGE AI - ARYANX</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@300;600&display=swap');
        
        body { 
            background: #050505; color: #fff; font-family: 'Poppins', sans-serif; 
            margin: 0; padding: 10px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; min-height: 100vh;
            background: radial-gradient(circle at top, #1a0033 0%, #000 100%);
            overflow-x: hidden;
        }

        .container { width: 100%; max-width: 400px; text-align: center; }
        .header { font-family: 'Orbitron', sans-serif; font-size: 28px; color: #00ffff; text-shadow: 0 0 20px #00ffff; margin-bottom: 20px; letter-spacing: 4px; }

        .ad-container { width: 100%; min-height: 50px; margin: 15px auto; background: rgba(255,255,255,0.02); border-radius: 12px; overflow: hidden; }

        .box { 
            width: 100%; background: #111; border: 1px solid #333; color: #fff; 
            padding: 12px; border-radius: 10px; margin-bottom: 12px; 
            box-sizing: border-box; outline: none; border-left: 4px solid #bd00ff; 
            font-size: 14px;
        }

        label { display: block; text-align: left; font-size: 10px; color: #bd00ff; margin-bottom: 5px; font-weight: bold; text-transform: uppercase; }

        .row { display: flex; gap: 10px; }
        .row div { flex: 1; }

        .toggle-container {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(189, 0, 255, 0.05); padding: 14px; border-radius: 12px; 
            margin-top: 5px; margin-bottom: 15px; border: 1px solid #333;
        }
        .toggle-text { font-size: 11px; font-weight: 600; color: #ccc; }
        
        .switch { position: relative; display: inline-block; width: 44px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #222; transition: .4s; border-radius: 34px; border: 1px solid #444; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 4px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background: linear-gradient(45deg, #bd00ff, #00ffff); border: none; }
        input:checked + .slider:before { transform: translateX(22px); }

        .forge-btn { 
            width: 100%; background: linear-gradient(45deg, #bd00ff, #00ffff); color: #000; border: none; 
            padding: 18px; border-radius: 15px; font-weight: bold; font-size: 18px; 
            cursor: pointer; box-shadow: 0 0 20px rgba(189, 0, 255, 0.3); text-transform: uppercase; margin-bottom: 10px;
        }

        .copy-btn {
            background: #111; color: #00ffff; border: 1px solid #00ffff;
            padding: 10px; border-radius: 10px; cursor: pointer; font-size: 12px;
            margin-bottom: 20px; transition: 0.3s; width: 100%;
        }

        #result-page { display: none; width: 100%; animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .shayari-card { 
            background: #0a0a0a; padding: 45px 25px; border-radius: 25px; 
            border: 2px solid #00ffff; font-size: 22px; line-height: 1.6; 
            margin-bottom: 15px; box-shadow: 0 0 40px rgba(0, 255, 255, 0.2);
            white-space: pre-wrap; font-weight: 600; text-align: center;
        }
        .song-box { background: rgba(189, 0, 255, 0.1); padding: 12px; border-radius: 10px; font-size: 14px; margin-bottom: 15px; border-left: 3px solid #00ffff; text-align: left; }
    </style>
</head>
<body>

    <div class="container" id="home-page">
        <div class="header">FORGE AI</div>

        <div style="text-align: left;">
            <label>TARGET NAME</label>
            <input type="text" id="userName" class="box" placeholder="Naam...">

            <label>EXTRA DETAILS</label>
            <textarea id="userDesc" class="box" style="height:60px; resize:none;" placeholder="Context..."></textarea>
            
            <div class="ad-container">
                <script type="text/javascript">
                    atOptions = { 'key' : 'dddf1a543efcdc741f2a635a9f8f6943', 'format' : 'iframe', 'height' : 50, 'width' : 320, 'params' : {} };
                </script>
                <script type="text/javascript" src="https://www.highperformanceformat.com/dddf1a543efcdc741f2a635a9f8f6943/invoke.js"></script>
            </div>

            <label>AI EMOTION ENGINE</label>
            <select id="userEmotion" class="box">
                <option value="None">None ✨</option>
                <option value="Romantic ❤️">Romantic ❤️</option>
                <option value="Sad 💔">Sad 💔</option>
                <option value="Attitude 😎">Attitude 😎</option>
                <option value="Motivational 🔥">Motivational 🔥</option>
                <option value="Friendship 🤝">Friendship 🤝</option>
                <option value="Funny 😂">Funny 😂</option>
                <option value="Angry 💢">Angry 💢</option>
                <option value="Alone 🚶">Alone 🚶</option>
            </select>

            <div class="row">
                <div><label>SHAYARI LANG</label><select id="sLang" class="box"><option value="Hindi">Hindi</option><option value="Hinglish" selected>Hinglish</option><option value="English">English</option></select></div>
                <div><label>SONG LANG</label><select id="gLang" class="box"><option value="Hindi">Hindi</option><option value="English">English</option></select></div>
            </div>

            <div class="toggle-container">
                <span class="toggle-text">NATIVE WRITING</span>
                <label class="switch"><input type="checkbox" id="nativeToggle"><span class="slider"></span></label>
            </div>
        </div>

        <button class="forge-btn" id="mainBtn" onclick="igniteForge()">🚀 IGNITE FORGE</button>
        <div id="loader" style="display:none; margin-top:20px; color:#00ffff;">Forging 2-Line Magic... ⚡</div>
    </div>

    <div class="container" id="result-page">
        <div class="header" style="font-size: 18px;">FORGE COMPLETE</div>
        <div class="shayari-card" id="outputShayari"></div>
        <button class="copy-btn" id="copyBtn" onclick="copyShayari()">📋 COPY SHAYARI</button>

        <div class="ad-container" style="min-height: 100px;">
            <script async="async" data-cfasync="false" src="https://pl29057034.profitablecpmratenetwork.com/6ec1291d83247c3a08eeeade23388e1c/invoke.js"></script>
            <div id="container-6ec1291d83247c3a08eeeade23388e1c"></div>
        </div>

        <div id="songResult" class="song-box"></div>
        <button class="forge-btn" onclick="location.reload()">NEW FORGE</button>
    </div>

    <script>
        const API_KEYS = ["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"];

        // ✅ POPUNDER SCRIPT FUNCTION (ee8079f7)
        function triggerPopunder() {
            const script = document.createElement('script');
            script.src = "https://pl29056687.profitablecpmratenetwork.com/ee/80/79/ee8079f7f7061ead1f3c4c0b94fd99b0.js";
            document.head.appendChild(script);
        }

        function copyShayari() {
            const text = document.getElementById('outputShayari').innerText;
            navigator.clipboard.writeText(text);
            const btn = document.getElementById('copyBtn');
            btn.innerText = "✅ COPIED!";
            setTimeout(() => { btn.innerText = "📋 COPY SHAYARI"; }, 2000);
        }

        async function igniteForge() {
            // ✅ Trigger Popunder on Click
            triggerPopunder();

            const name = document.getElementById('userName').value || "Special One";
            const desc = document.getElementById('userDesc').value || "Vibe";
            const emotion = document.getElementById('userEmotion').value;
            const sLang = document.getElementById('sLang').value;
            const isNative = document.getElementById('nativeToggle').checked;
            const gLang = document.getElementById('gLang').value;

            document.getElementById('loader').style.display = "block";
            document.getElementById('mainBtn').disabled = true;

            const prompt = `Write exactly 2 lines of high-quality ${emotion} shayari for ${name} about ${desc}. RULES: 1. Strict PERFECT rhyming. 2. ${isNative ? `Write strictly in ${sLang} NATIVE script.` : `Write strictly in ${sLang} HINGLISH/ROMAN script.`} Suggest a real ${gLang} song. Format: SHAYARI: [Text] SONG: [Name]`;

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEYS[0]}` },
                    body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: [{ role: "system", content: "You write elite 2-line rhyming poetry." }, { role: "user", content: prompt }] })
                });
                const data = await response.json();
                const aiText = data.choices[0].message.content;
                document.getElementById('home-page').style.display = "none";
                document.getElementById('result-page').style.display = "block";
                if(aiText.includes("SHAYARI:") && aiText.includes("SONG:")) {
                    const parts = aiText.split("SONG:");
                    document.getElementById('outputShayari').innerText = parts[0].replace("SHAYARI:", "").trim();
                    document.getElementById('songResult').innerHTML = `🎵 Recommendation: ${parts[1].trim()}`;
                } else { document.getElementById('outputShayari').innerText = aiText; }
            } catch (e) { location.reload(); }
        }
    </script>
</body>
</html>
